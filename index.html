<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocker Proxy</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f0f2f5; }
        .container { max-width: 800px; margin: auto; }
        input { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        iframe { width: 100%; height: 600px; border: 1px solid #ddd; margin-top: 20px; background: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CORS Bypass Iframe</h1>
        <p>閲覧したいURLを入力してください（例: https://www.wikipedia.org）</p>
        <input type="text" id="urlInput" placeholder="https://example.com">
        <button onclick="loadPage()">閲覧する</button>

        <iframe id="proxyFrame"></iframe>
    </div>

    <script>
        function loadPage() {
            const url = document.getElementById('urlInput').value;
            if (!url) return alert('URLを入力してください');
            
            // プロキシ経由のパスに変換してiframeのsrcに設定
            const proxyUrl = window.location.origin + '/proxy/' + url;
            document.getElementById('proxyFrame').src = proxyUrl;
        }
    </script>
</body>
</html>
